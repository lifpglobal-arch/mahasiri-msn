<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ចុះឈ្មោះសមាជិក - មហាសិរី (MSN)</title>
    <style>
        body { font-family: 'Khmer OS Battambang', sans-serif; background: #f4f4f4; padding: 20px; }
        .form-container { background: white; padding: 25px; border-radius: 10px; max-width: 450px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 3px; font-size: 14px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { background: #003366; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .back-link { margin-top: 15px; display: block; text-align: center; color: #003366; text-decoration: none; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2 style="text-align:center;">ចុះឈ្មោះសមាជិកថ្មី</h2>
        <div class="input-group"><label>ឈ្មោះពេញ</label><input type="text" id="name"></div>
        <div class="input-group"><label>លេខទូរស័ព្ទ</label><input type="tel" id="phone"></div>
        <div class="input-group"><label>ភេទ</label><select id="gender"><option value="ប្រុស">ប្រុស</option><option value="ស្រី">ស្រី</option></select></div>
        <div class="input-group"><label>ថ្ងៃខែឆ្នាំកំណើត</label><input type="date" id="dob"></div>
        
        <hr>
        <h4 style="margin: 10px 0;">អាសយដ្ឋានបច្ចុប្បន្ន៖</h4>
        <div class="input-group"><label>ភូមិ</label><input type="text" id="village"></div>
        <div class="input-group"><label>ឃុំ/សង្កាត់</label><input type="text" id="commune"></div>
        <div class="input-group"><label>ស្រុក/ខណ្ឌ</label><input type="text" id="district"></div>
        <div class="input-group"><label>ខេត្ត/រាជធានី</label><input type="text" id="province"></div>
        
        <div class="input-group"><label>មុខរបរបច្ចុប្បន្ន</label><input type="text" id="job"></div>
        
        <button class="btn" onclick="sendToTelegram()">បញ្ជូនទិន្នន័យចុះឈ្មោះ</button>
        <a href="index.html" class="back-link">← ត្រឡប់ទៅទំព័រដើម</a>
    </div>

    <script>
        function sendToTelegram() {
            const data = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                gender: document.getElementById('gender').value,
                dob: document.getElementById('dob').value,
                village: document.getElementById('village').value,
                commune: document.getElementById('commune').value,
                district: document.getElementById('district').value,
                province: document.getElementById('province').value,
                job: document.getElementById('job').value
            };
            
            const token = "7297926135:AAE-R8U6l8Y4z9Hj7W5Q2X-E";
            const chat_id = "6411516709";
            const message = `📌 សមាជិកថ្មី!%0Aឈ្មោះ: ${data.name}%0Aទូរស័ព្ទ: ${data.phone}%0Aភេទ: ${data.gender}%0Aថ្ងៃកំណើត: ${data.dob}%0A---%0Aភូមិ: ${data.village}%0Aឃុំ: ${data.commune}%0Aស្រុក: ${data.district}%0Aខេត្ត: ${data.province}%0A---%0Aមុខរបរ: ${data.job}`;
            
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${message}`)
            .then(() => alert("ចុះឈ្មោះជោគជ័យ!"));
        }
    </script>
</body>
</html>
