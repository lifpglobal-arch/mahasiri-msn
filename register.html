<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ចុះឈ្មោះសមាជិក - មហាសិរី (MSN)</title>
    <style>
        body { font-family: 'Khmer OS Battambang', sans-serif; background: #f4f4f4; padding: 20px; }
        .form-container { background: white; padding: 30px; border-radius: 10px; max-width: 450px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { background: #003366; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .back-link { margin-top: 15px; display: block; text-align: center; color: #003366; text-decoration: none; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>ចុះឈ្មោះសមាជិកថ្មី</h2>
        <div class="input-group"><label>ឈ្មោះពេញ</label><input type="text" id="name"></div>
        <div class="input-group"><label>លេខទូរស័ព្ទ</label><input type="tel" id="phone"></div>
        <div class="input-group"><label>ភេទ</label><select id="gender"><option value="ប្រុស">ប្រុស</option><option value="ស្រី">ស្រី</option></select></div>
        <div class="input-group"><label>ថ្ងៃខែឆ្នាំកំណើត</label><input type="date" id="dob"></div>
        <div class="input-group"><label>អាសយដ្ឋាន</label><input type="text" id="address"></div>
        <div class="input-group"><label>មុខរបរ</label><input type="text" id="job"></div>
        <div class="input-group"><label>ខេត្ត</label><select id="province"><option value="PP">ភ្នំពេញ</option><option value="SR">សៀមរាប</option></select></div>
        
        <button class="btn" onclick="sendToTelegram()">បញ្ជូនទិន្នន័យ</button>
        <a href="index.html" class="back-link">ត្រឡប់ទៅទំព័រដើមវិញ</a>
    </div>

    <script>
        function sendToTelegram() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const gender = document.getElementById('gender').value;
            const dob = document.getElementById('dob').value;
            const address = document.getElementById('address').value;
            const job = document.getElementById('job').value;
            const province = document.getElementById('province').value;
            
            const token = "7297926135:AAE-R8U6l8Y4z9Hj7W5Q2X-E";
            const chat_id = "6411516709";
            const message = `📌 សមាជិកថ្មី!%0Aឈ្មោះ: ${name}%0Aទូរស័ព្ទ: ${phone}%0Aភេទ: ${gender}%0Aថ្ងៃកំណើត: ${dob}%0Aអាសយដ្ឋាន: ${address}%0Aមុខរបរ: ${job}%0Aខេត្ត: ${province}`;
            
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${message}`)
            .then(() => alert("ចុះឈ្មោះជោគជ័យ!"));
        }
    </script>
</body>
</html>
